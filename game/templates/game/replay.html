{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Checkora - Replay Mode</title>
    <link rel="stylesheet" href="{% static 'game/css/board.css' %}">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
</head>

<body>
    <div class="game-layout"
        style="visibility: visible !important; display: flex !important; justify-content: center; gap: 20px; padding: 30px;">

        <div class="left-panel-column" style="width: 250px;">
            <div class="card">
                <div class="card-title">Captured by <span id="whiteCapturedName">White</span></div>
                <div class="captured-list" id="whiteCaptured"></div>
                <div class="captured-score">Points: <span id="whitePoints">+0</span></div>
            </div>
            <div class="card">
                <div class="card-title">Captured by <span id="blackCapturedName">Black</span></div>
                <div class="captured-list" id="blackCaptured"></div>
                <div class="captured-score">Points: <span id="blackPoints">+0</span></div>
            </div>
            <div class="card board-theme-card">
                <div class="card-title">BOARD THEME</div>
                <div class="theme-toggles" style="display: flex; justify-content: space-around; margin-top: 10px;">
                    <div class="theme-btn" data-theme="classic"
                        style="background: #eecd97; width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid #fff;">
                    </div>
                    <div class="theme-btn" data-theme="dark"
                        style="background: #4a4a4a; width: 25px; height: 25px; border-radius: 50%; cursor: pointer;">
                    </div>
                    <div class="theme-btn" data-theme="green"
                        style="background: #769656; width: 25px; height: 25px; border-radius: 50%; cursor: pointer;">
                    </div>
                    <div class="theme-btn" data-theme="blue"
                        style="background: #4b7399; width: 25px; height: 25px; border-radius: 50%; cursor: pointer;">
                    </div>
                </div>
            </div>
        </div>

        <div class="center-board-column" style="display: flex; flex-direction: column; align-items: center;">
            <h2 style="color: #f5a623; letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase;">Match
                Replay</h2>
            <div class="board-container">
                <div class="board-outer">
                    <div class="board-aligned">
                        <div class="board-grid-wrap">
                            <div class="chessboard" id="board" style="width: 450px; height: 450px;"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="replay-controls-horizontal"
                style="display: flex; justify-content: center; gap: 10px; margin-top: 20px; width: 100%;">
                <button id="btnPrev" class="btn btn-gold" style="flex: 1; padding: 8px;">⏮ Prev</button>
                <button id="btnPlay" class="btn btn-gold" style="flex: 1; padding: 8px;">▶ Auto-Play</button>
                <button id="btnPause" class="btn btn-gold" style="flex: 1; padding: 8px;">⏸ Pause</button>
                <button id="btnNext" class="btn btn-gold" style="flex: 1; padding: 8px;">Next ⏭</button>
            </div>
            <div id="statusMsg" class="status-message"
                style="color: #ff4c4c; text-align: center; margin-top: 10px; min-height: 20px;"></div>
        </div>

        <div class="right-panel-column" style="width: 280px; display: flex; flex-direction: column;">
            <div class="card move-history-card"
                style="flex-grow: 1; display: flex; flex-direction: column; margin-bottom: 15px; min-height: 300px;">
                <div class="card-title">MOVE HISTORY</div>
                <div id="moveHistoryBody" style="overflow-y: auto; flex-grow: 1;">
                    <p style="color: #666; text-align: center; margin-top: 20px;">Load a match to see history.</p>
                </div>
            </div>
            <div class="card data-load-card">
                <button id="btnFetchDB" class="btn btn-gold"
                    style="width: 100%; background: #4a90e2; color: #fff; border-color: #4a90e2;">Watch Recent
                    Match</button>
                <div style="margin-top: 15px;">
                    <label style="font-size: 0.8em; color: #aaa; display: block; margin-bottom: 5px;">Or upload a PGN
                        file:</label>
                    <input type="file" id="pgnUpload" accept=".pgn"
                        style="width: 100%; font-size: 0.85em; color: #ccc;">
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="{% static 'game/js/replay.js' %}"></script>
</body>

</html>
</body>

</html>
